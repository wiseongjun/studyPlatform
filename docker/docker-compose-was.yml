services:
  eureka:
    build: ../eureka
    container_name: study-eureka
    restart: always
    volumes:
      - ./logs/eureka:/usr/src/app/log
      - ./yml/application-eureka.yml:/usr/src/app/application.yml
      - ./yml/application-common.yml:/usr/src/app/application-common.yml
    command: java -jar app.jar --spring.config.location=./application.yml
    ports:
      - "${EUREKA_PORT}:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  gateway:
    build: ../gateway
    container_name: study-gateway
    restart: always
    volumes:
      - ./logs/gateway:/usr/src/app/log
      - ./yml/application-gateway.yml:/usr/src/app/application.yml
      - ./yml/application-common.yml:/usr/src/app/application-common.yml
    command: java -jar app.jar --spring.config.location=./application.yml
    environment:
      EUREKA_HOST: ${EUREKA_HOST}
      EUREKA_PORT: ${EUREKA_PORT}
    ports:
      - "${GATEWAY_PORT}:8080"
    depends_on:
      eureka:
        condition: service_healthy

  flyway:
    build: ../flyway
    container_name: study-flyway
    volumes:
      - ./logs/flyway:/usr/src/app/log
      - ./yml/application-flyway.yml:/usr/src/app/application.yml
    command: java -jar app.jar --spring.config.location=./application.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_SERVER_IP}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

  problem:
    build: ../problem
    container_name: study-problem
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/problem:/usr/src/app/log
      - ./yml/application-common.yml:/usr/src/app/application-common.yml
      - ./yml/application-web.yml:/usr/src/app/application-web.yml
      - ./yml/application-problem.yml:/usr/src/app/application.yml
    command: java -jar app.jar --spring.config.location=./application.yml
    environment:
      DB_HOST: ${DB_SERVER_IP}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${DB_SERVER_IP}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
      EUREKA_PORT: ${EUREKA_PORT}
    depends_on:
      flyway:
        condition: service_completed_successfully
      eureka:
        condition: service_healthy

  user_manage:
    build: ../user
    container_name: study-user
    restart: always
    volumes:
      - ./logs/user:/usr/src/app/log
      - ./yml/application-common.yml:/usr/src/app/application-common.yml
      - ./yml/application-web.yml:/usr/src/app/application-web.yml
      - ./yml/application-user.yml:/usr/src/app/application.yml
    command: java -jar app.jar --spring.config.location=./application.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_SERVER_IP}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${DB_SERVER_IP}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
      EUREKA_PORT: ${EUREKA_PORT}
    depends_on:
      flyway:
        condition: service_completed_successfully
      eureka:
        condition: service_healthy

  chapter:
    build: ../chapter
    container_name: study-chapter
    restart: always
    volumes:
      - ./logs/chapter:/usr/src/app/log
      - ./yml/application-common.yml:/usr/src/app/application-common.yml
      - ./yml/application-web.yml:/usr/src/app/application-web.yml
      - ./yml/application-chapter.yml:/usr/src/app/application.yml
    command: java -jar app.jar --spring.config.location=./application.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_SERVER_IP}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${DB_SERVER_IP}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_HOST: ${EUREKA_HOST}
      EUREKA_PORT: ${EUREKA_PORT}
    depends_on:
      flyway:
        condition: service_completed_successfully
      eureka:
        condition: service_healthy

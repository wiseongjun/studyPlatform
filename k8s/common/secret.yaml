apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: backend
type: Opaque
stringData:
  # DB_HOST / REDIS_HOST 는 k8s 내부 Service 이름.
  # 실제 엔드포인트는 k8s/common/external-db.yaml + start.sh 의 EndpointSlice 주입으로 연결된다.
  # (로컬: 호스트 맥북의 MySQL/Redis / 운영: RDS/ElastiCache 로 Service 타입만 교체)
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "TEST"
  DB_USER: "test"
  DB_PASSWORD: "test"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "study1234"
  JWT_SECRET: "your-jwt-secret"

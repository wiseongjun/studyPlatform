# =====================================================================
# 클러스터 밖의 MySQL / Redis 를 k8s 네이티브 이름으로 감싸는 레이어.
#
# 현재 (로컬 kind + Docker Compose DB):
#   - Selector 없는 Service + 수동 EndpointSlice 조합을 사용한다.
#   - EndpointSlice 의 실제 IP 는 start.sh 가 kind 도커 네트워크 게이트웨이
#     (= 호스트 맥북) 을 동적으로 찾아 주입한다.
#   - 파드는 mysql.backend.svc.cluster.local:3306 / redis.backend.svc.cluster.local:6379
#     로 접근하면 되고, CoreDNS 를 건드릴 필요가 없다.
#
# 나중에 (EKS + RDS / ElastiCache):
#   - 아래 Service 블록을 ExternalName 타입으로 교체하면 된다.
#   - EndpointSlice 는 필요 없음 (CNAME 한 방으로 끝).
#   - 앱 설정/Secret 의 DB_HOST=mysql, REDIS_HOST=redis 는 그대로 유지.
#   - 예시는 파일 맨 아래 주석 참고.
# =====================================================================

apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: backend
spec:
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
  # selector 없음 -> k8s 가 자동 EndpointSlice 를 만들지 않는다.
  # EndpointSlice 는 start.sh 가 호스트 IP 와 함께 동적으로 apply 한다.
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: backend
spec:
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  # selector 없음 -> EndpointSlice 를 start.sh 에서 주입.

# ---------------------------------------------------------------------
# [참고] EKS + RDS/ElastiCache 전환 시 교체 예시
# ---------------------------------------------------------------------
# apiVersion: v1
# kind: Service
# metadata:
#   name: mysql
#   namespace: backend
# spec:
#   type: ExternalName
#   externalName: mydb.xxxxxxxxxxxx.ap-northeast-2.rds.amazonaws.com
# ---
# apiVersion: v1
# kind: Service
# metadata:
#   name: redis
#   namespace: backend
# spec:
#   type: ExternalName
#   externalName: myredis.xxxxxx.ng.0001.apn2.cache.amazonaws.com
#
# ExternalName 은 DNS CNAME 으로만 동작하므로:
#   - externalName 값에 IP 는 넣을 수 없다 (RFC 1123 DNS name 만 허용).
#   - 로컬 맥 호스트는 정식 DNS 이름이 없어서 현재 단계에선 못 쓴다.
#   - 반대로 RDS/ElastiCache 는 endpoint 가 DNS 이름이라 이상적이다.
# ---------------------------------------------------------------------
